<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asaya Boys Take NYC</title>
<style>
  :root{
    --night-1:#0B1033; --night-2:#1a1450; --night-3:#241A5C;
    --dusk:#3a2170; --sunset-1:#E0668A; --sunset-2:#F4A15A; --sunset-3:#f7c26b;
    --yellow:#FFC531; --teal:#1FA6A0; --red:#E5463C; --green:#2FA84F;
    --blue:#2E7CD6; --amber:#E0912F; --magenta:#C0468A;
    --card:#FBF6EA; --ink:#241A33; --ink-soft:#6a5f6e;
    --pin:#E5463C;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:#05060f;}
  body{font-family:var(--sans);}

  .fit{position:fixed;inset:0;background:
      radial-gradient(120% 90% at 50% 8%, #2a1f63 0%, #0B1033 46%, #060819 100%);
    overflow:hidden;}

  .stage{
    position:absolute; top:50%; left:50%;
    width:1600px; height:900px; transform:translate(-50%,-50%);
    transform-origin:center center; overflow:hidden;
    border-radius:6px;
    background:linear-gradient(180deg,#0B1033 0%, #201657 40%, #3a2170 66%, #6b3a72 82%, #b9536f 93%, #ef9a5c 100%);
    box-shadow:0 40px 120px -30px rgba(0,0,0,.8);
  }

  /* ---- sky atmosphere ---- */
  .stars{position:absolute;inset:0;pointer-events:none;}
  .star{position:absolute;border-radius:50%;background:#fff;opacity:.85;
    animation:tw 4s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.25;}50%{opacity:.9;}}

  .moon{position:absolute;top:70px;right:150px;width:96px;height:96px;border-radius:50%;
    background:radial-gradient(circle at 38% 36%, #fff8e6 0%, #ffe9a8 55%, #f7d074 100%);
    box-shadow:0 0 50px 14px rgba(255,224,150,.45), inset -10px -8px 0 rgba(214,170,90,.35);}

  .glow{position:absolute;left:0;right:0;bottom:0;height:340px;pointer-events:none;
    background:radial-gradient(120% 150% at 50% 120%,
      rgba(255,197,102,.55) 0%, rgba(224,102,138,.35) 34%, rgba(58,33,112,0) 62%);}

  .skyline{position:absolute;left:0;right:0;bottom:0;width:100%;height:300px;display:block;}
  .grain{position:absolute;inset:0;opacity:.05;pointer-events:none;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");}
  .vignette{position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 200px 40px rgba(5,6,15,.55);}

  /* ---- floating stickers ---- */
  .sticker{position:absolute;font-size:60px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.4));
    animation:float 6s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(var(--r,0deg));}50%{transform:translateY(-14px) rotate(var(--r,0deg));}}

  /* ---- content ---- */
  .content{position:absolute;inset:0;display:flex;flex-direction:column;padding:28px 56px 16px;}

  header{text-align:center;flex:none;}
  .eyebrow{font-size:17px;font-weight:800;letter-spacing:.42em;text-transform:uppercase;
    color:var(--yellow);text-shadow:0 2px 8px rgba(0,0,0,.5);margin-bottom:6px;}
  .eyebrow .sp{color:#fff;opacity:.5;margin:0 12px;}
  .title{margin:0;line-height:.88;text-wrap:balance;}
  .title .l1{display:block;font-size:50px;font-weight:800;letter-spacing:.02em;color:#fff;
    text-shadow:0 3px 0 #1a1450,0 6px 22px rgba(0,0,0,.5);}
  .title .l2{display:block;font-size:112px;font-weight:900;text-transform:uppercase;letter-spacing:.005em;
    color:var(--yellow);
    text-shadow:
      3px 3px 0 #1a1450, 6px 6px 0 #1a1450, 8px 8px 0 #14103f, 10px 10px 0 #14103f,
      12px 16px 36px rgba(0,0,0,.55), 0 0 40px rgba(31,166,160,.35);}
  .title .l2 .take{color:#fff;font-size:54px;font-weight:800;text-transform:lowercase;font-style:italic;
    letter-spacing:0;text-shadow:0 3px 0 #1a1450,0 6px 20px rgba(0,0,0,.5);vertical-align:middle;margin-right:13px;}
  .title .l2 .liberty{-webkit-text-fill-color:initial;font-size:88px;vertical-align:-6px;margin-left:10px;
    text-shadow:0 8px 22px rgba(0,0,0,.5);}
  .dates{margin-top:8px;font-size:20px;font-weight:600;color:#f3e8ff;font-variant-numeric:tabular-nums;}
  .dates b{color:var(--yellow);font-weight:800;}
  .dates .dot{color:var(--teal);margin:0 10px;font-weight:900;}

  /* ---- trip board ---- */
  .board{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);
    grid-template-rows:1fr 1fr;gap:12px 22px;margin-top:11px;padding:0 4px;}
  .card{position:relative;background:var(--card);border-radius:14px;padding:13px 18px 12px;
    color:var(--ink);transform:rotate(var(--rot,0deg));
    box-shadow:0 16px 34px -12px rgba(0,0,0,.6),0 3px 0 rgba(0,0,0,.15);
    display:flex;flex-direction:column;min-height:0;
    border:1px solid rgba(0,0,0,.06);}
  .card::before{content:"";position:absolute;left:14px;right:14px;top:0;height:7px;border-radius:0 0 5px 5px;
    background:var(--ac);}
  .pin{position:absolute;top:-11px;left:50%;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff 8%, var(--ac) 40%, rgba(0,0,0,.35) 100%);
    box-shadow:0 4px 8px rgba(0,0,0,.45);z-index:2;}
  .day{font-size:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ac);margin-top:5px;}
  .row{display:flex;align-items:center;gap:13px;margin-top:5px;}
  .emoji{font-size:46px;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.2));flex:none;}
  .name{font-size:26px;font-weight:800;line-height:1.04;letter-spacing:-.01em;text-wrap:balance;}
  .hook{margin-top:7px;font-size:16.5px;line-height:1.28;color:var(--ink-soft);font-weight:500;}
  .tagrow{margin-top:auto;padding-top:9px;display:flex;align-items:center;}
  .stamp{font-size:15px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ac);border:2.5px solid var(--ac);border-radius:8px;padding:3px 12px;
    transform:rotate(-6deg);opacity:.92;}
  .softtag{font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:7px;}
  .softtag::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--ac);}

  .c-liberty{--ac:var(--teal);}
  .c-summit{--ac:var(--blue);}
  .c-museum{--ac:var(--amber);}
  .c-msg{--ac:var(--red);}
  .c-cup{--ac:var(--green);}
  .c-city{--ac:var(--magenta);}

  /* ---- road-trip scene (bobbleheads in a taxi) ---- */
  .roadtrip{flex:none;margin-top:8px;display:flex;align-items:flex-end;justify-content:center;gap:34px;padding:0 8px;}
  .taxi-scene{position:relative;width:560px;height:206px;flex:none;}
  .taxi{position:absolute;left:0;bottom:0;width:100%;height:100%;overflow:visible;}
  .speed{position:absolute;bottom:34px;height:5px;border-radius:3px;background:rgba(255,255,255,.55);}
  .head{position:absolute;height:122px;width:auto;
    filter:drop-shadow(0 8px 9px rgba(0,0,0,.55));}
  .h-boyL{left:66px;bottom:76px;transform:rotate(-6deg);z-index:2;}
  .h-dad{left:190px;bottom:86px;transform:rotate(2deg);z-index:4;}
  .h-boyR{left:312px;bottom:72px;transform:rotate(6deg);z-index:1;}
  .rt-caption{max-width:430px;padding-bottom:20px;}
  .rt-title{font-size:31px;font-weight:900;color:var(--yellow);line-height:1.05;letter-spacing:.005em;
    text-shadow:0 3px 0 #14103f,0 5px 16px rgba(0,0,0,.5);text-wrap:balance;}
  .rt-sub{margin-top:10px;font-size:19px;font-weight:600;color:#efe6ff;line-height:1.42;}
  .rt-sub b{color:var(--yellow);}
  .rt-sub .sep{color:var(--teal);margin:0 8px;font-weight:900;}

  /* ---- one-time reveal ---- */
  .reveal{opacity:0;transform:translateY(26px) rotate(var(--rot,0deg));
    animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:var(--d,0s);}
  @keyframes rise{to{opacity:1;transform:translateY(0) rotate(var(--rot,0deg));}}
  .reveal-soft{opacity:0;animation:fade .8s ease forwards;animation-delay:var(--d,0s);}
  @keyframes fade{to{opacity:1;}}

  @media (prefers-reduced-motion:reduce){
    .star{animation:none;opacity:.7;}
    .sticker{animation:none;}
    .reveal,.reveal-soft{animation:none;opacity:1;transform:rotate(var(--rot,0deg));}
  }
</style>
</head>

<script>
(function(){
  // starfield
  var stars = document.getElementById('stars');
  var frag = document.createDocumentFragment();
  for (var i=0;i<90;i++){
    var s = document.createElement('span');
    s.className='star';
    var sz = Math.random()*2.2 + 0.8;
    s.style.width = sz+'px'; s.style.height = sz+'px';
    s.style.left = (Math.random()*100)+'%';
    s.style.top = (Math.random()*62)+'%';
    s.style.animationDelay = (Math.random()*4)+'s';
    frag.appendChild(s);
  }
  stars.appendChild(frag);

  // lit windows on the skyline
  var win = document.getElementById('win');
  var ns='http://www.w3.org/2000/svg';
  var cols=[[70,180],[196,120],[486,96],[800,130],[1104,86],[1256,150],[344,150],[956,150],[1416,158]];
  var wf = document.createDocumentFragment();
  for (var c=0;c<cols.length;c++){
    var bx=cols[c][0], by=cols[c][1];
    for (var yy=by+16; yy<296; yy+=20){
      for (var xx=8; xx<46; xx+=16){
        if (Math.random()<0.5) continue;
        var r=document.createElementNS(ns,'rect');
        r.setAttribute('x', bx+xx); r.setAttribute('y', yy);
        r.setAttribute('width','6'); r.setAttribute('height','8');
        r.setAttribute('opacity', (0.35+Math.random()*0.5).toFixed(2));
        wf.appendChild(r);
      }
    }
  }
  win.appendChild(wf);

  // fit stage to viewport
  function fit(){
    var st=document.getElementById('stage');
    var sc=Math.min(window.innerWidth/1600, window.innerHeight/900);
    st.style.transform='translate(-50%,-50%) scale('+sc+')';
  }
  window.addEventListener('resize', fit);
  fit();
})();
</script>
